name: Build Flutter APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Flutter
      run: |
        git clone https://github.com/flutter/flutter.git -b stable
        echo "$PWD/flutter/bin" >> $GITHUB_PATH
        flutter doctor

    - name: Create App
      run: |
        if [ ! -d "chronofold_app" ]; then
          flutter create chronofold_app
        fi

    - name: Add HTTP
      run: |
        cd chronofold_app
        flutter pub add http

    - name: Build APK
      run: |
        cd chronofold_app
        flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: chronofold-apk
        path: chronofold_app/build/app/outputs/flutter-apk/app-release.apk
