name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/flutter.yml'
      - 'chronofold_app/**'
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create app scaffold if missing
        run: |
          if [ ! -d "chronofold_app" ]; then
            flutter create chronofold_app
          fi

      - name: Install dependencies
        run: |
          cd chronofold_app
          flutter pub add http

      - name: Build APK
        run: |
          cd chronofold_app
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronofold-flutter-apk
          path: chronofold_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
