name: IQVF COCO Benchmark

on:
  push:
  workflow_dispatch:

jobs:
  run-benchmark:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run benchmark
      run: |
        python run_iqvf_coco.py

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: coco-results
        path: results/
