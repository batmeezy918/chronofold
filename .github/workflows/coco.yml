name: S6 COCO Benchmark

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/coco.yml'
      - 'coco_s6_benchmark.py'

permissions:
  contents: read

jobs:
  run-benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy cocoex

      - name: Prepare output folder
        run: |
          mkdir -p S6_RESULTS
          printf 'workflow=s6-coco\nstatus=initialized\n' > S6_RESULTS/run_summary.txt

      - name: Run S6 benchmark
        run: |
          python coco_s6_benchmark.py
          printf 'workflow=s6-coco\nstatus=completed\n' > S6_RESULTS/run_summary.txt

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s6-coco-results
          path: |
            S6_RESULTS/
            coco_s6_benchmark.py
          if-no-files-found: error
