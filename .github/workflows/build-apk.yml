name: Build ChronoFold UI APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'ui/**'
      - '.github/workflows/build-apk.yml'
    branches: [ "main" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check UI presence
        id: check_ui
        run: |
          if [ -f ui/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if UI missing
        if: steps.check_ui.outputs.exists == 'false'
        run: |
          echo "UI folder not present, skipping APK build"

      - name: Build web assets
        if: steps.check_ui.outputs.exists == 'true'
        run: |
          cd ui
          npm ci
          npm run build

      - name: Build APK from web app
        if: steps.check_ui.outputs.exists == 'true'
        uses: cemcoe/web-to-apk-action@v1
        with:
          app_name: "ChronoFold"
          app_id: "com.batmeezy.chronofold"
          build_command: "cd ui && npm ci && npm run build"
          web_dir: "ui/dist"

      - name: Upload APK artifact
        if: steps.check_ui.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: chronofold-apk
          path: |
            android/app/build/outputs/apk/**/*.apk
            app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
