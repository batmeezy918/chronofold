name: Lean Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lean
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Set Toolchain
        run: |
          elan default stable
          lean --version

      - name: Initialize Lake Project (FORCE)
        run: |
          lake init Chronofold || true

      - name: Build
        run: lake build
