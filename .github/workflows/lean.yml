steps:
  - uses: actions/checkout@v3

  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Install Lean
    uses: leanprover/lean-action@v1

  - name: Build Lean
    run: lake build

  - name: Run SNAP Benchmark
    run: python3 benchmark_snap.py
