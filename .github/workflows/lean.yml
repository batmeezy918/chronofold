name: Lean + SNAP Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # 🔥 CRITICAL FIX
      - name: Initialize Lake
        run: lake update

      - name: Install Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: true

      - name: Build Lean
        run: lake build

      - name: Run SNAP Benchmark
        run: python3 benchmark_snap.py
