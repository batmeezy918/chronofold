name: Lean + SNAP Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/lean.yml'
      - 'lakefile.lean'
      - 'Main.lean'
      - 'Verify.lean'
      - 'benchmark_snap.py'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          elan default stable
          lean --version
          lake --version

      - name: Initialize Lake
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          lake update

      - name: Build Lean
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          lake build 2>&1 | tee build.log

      - name: Run SNAP Benchmark
        run: |
          python3 benchmark_snap.py

      - name: Upload lean artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-snap-artifacts
          path: |
            build.log
            snap_result.json
            benchmark_snap.py
          if-no-files-found: error
