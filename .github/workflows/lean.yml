name: Lean Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Set Lean Toolchain
        run: |
          elan default stable
          lean --version

      - name: Initialize Lake Environment
        run: |
          rm -rf .lake
          lake update

      - name: Fetch Mathlib Cache
        run: lake exe cache get

      - name: Build Project
        run: lake build

