name: ChronoFold Autonomous Engine

permissions:
  contents: write

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  chronofold:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Lean
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
        echo "$HOME/.elan/bin" >> $GITHUB_PATH
        export PATH="$HOME/.elan/bin:$PATH"
        lean --version
        lake --version

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y jq

    - name: Prepare
      run: |
        mkdir -p ChronoFold/Auto
        mkdir -p theorems_unproven
        mkdir -p theorems_proven

    - name: Lake update
      run: lake update

    - name: Run engine
      run: |
        chmod +x chronofold_ci_engine.sh
        ./chronofold_ci_engine.sh

    - name: Commit
      run: |
        git config --global user.name "bot"
        git config --global user.email "bot@local"
        git add .
        git commit -m "auto update" || true
        git push
