name: SNAP Benchmark Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/snap-benchmark.yml'
      - 'snap_cma_harness.py'

permissions:
  contents: read

jobs:
  build-and-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy tqdm cma cocoex

      - name: Run SNAP Benchmark
        run: |
          python snap_cma_harness.py

      - name: Upload SNAP artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snap-results
          path: |
            results/
            snap_cma_harness.py
          if-no-files-found: error
