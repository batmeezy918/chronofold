name: SNAP Benchmark Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-benchmark:
    runs-on: ubuntu-latest

    steps:
    - name: 🧬 Checkout Repo
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: ⚙️ Install System Deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git

    - name: 📦 Clone COCO (FULL REPO)
      run: |
        git clone https://github.com/numbbo/coco.git

    - name: 🧪 Install COCO (NO CMAKE — FIXED)
      run: |
        cd coco/code-experiments/build/python
        pip install .

    - name: 📚 Install Python Dependencies
      run: |
        pip install numpy tqdm cma

    - name: 🧠 Verify COCO Install
      run: |
        python - <<EOF
import cocoex
print("COCO OK")
EOF

    - name: ⚡ Run SNAP Benchmark
      run: |
        python snap_cma_harness.py

    - name: 📊 Save Results
      run: |
        mkdir -p results
        cp -r *.txt results/ || true
        cp -r *.json results/ || true

    - name: 📦 Upload Artifacts (PRIVATE)
      uses: actions/upload-artifact@v4
      with:
        name: snap-results
        path: results/
