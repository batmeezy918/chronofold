name: Build ChronoFold

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Lake packages cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
            ~/.elan
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lean-

      - name: Install Lean via elan (with retries)
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o /tmp/elan-init.sh; then
              break
            fi
            echo "elan download failed on attempt $i" >&2
            sleep $((i * 2))
          done
          for i in 1 2 3; do
            if sh /tmp/elan-init.sh -y; then
              break
            fi
            echo "elan install failed on attempt $i" >&2
            sleep $((i * 2))
          done
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          elan --version
          lean --version
          lake --version

      - name: Validate repository structure
        shell: bash
        run: |
          set -euo pipefail
          test -f lean-toolchain
          test -f lakefile.lean
          test -f Main.lean
          test -f scripts/process_inbox.sh
          test -f scripts/validate_theorem.py
          test -f scripts/self_test_pipeline.sh

      - name: Run pipeline self-test
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.elan/bin:$PATH"
          chmod +x scripts/verify_codex_prereqs.sh scripts/process_inbox.sh scripts/self_test_pipeline.sh
          scripts/self_test_pipeline.sh 2>&1 | tee self-test.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chronofold-build-logs
          path: |
            self-test.log
          if-no-files-found: warn
