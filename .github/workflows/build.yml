name: Build ChronoFold

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Lake packages cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
            ~/.elan
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lean-

      - name: Install Lean via elan
        shell: bash
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          elan --version
          lean --version
          lake --version

      - name: Validate repository structure
        shell: bash
        run: |
          set -euo pipefail
          test -f lean-toolchain
          test -f lakefile.lean
          test -f Main.lean

      - name: Resolve dependencies
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.elan/bin:$PATH"
          lake update

      - name: Build project
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.elan/bin:$PATH"
          lake build 2>&1 | tee build.log

      - name: Run executable smoke test
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.elan/bin:$PATH"
          lake exe Main 2>&1 | tee smoke.log
          grep -F "ChronoFold system active" smoke.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chronofold-build-logs
          path: |
            build.log
            smoke.log
          if-no-files-found: warn
