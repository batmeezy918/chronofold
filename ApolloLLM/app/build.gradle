apply plugin: 'com.android.application'

android {
    namespace 'com.apollo'
    compileSdk 34

    defaultConfig {
        applicationId "com.apollo"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/jni/CMakeLists.txt"
        }
    }
}

dependencies {
    // Local embedded workflow engine dependencies
}
